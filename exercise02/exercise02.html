<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thejas Store</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, sans-serif;
}

body{
background:#f5f9ff;
}

/* Navbar */
nav{
background:#0a66ff;
color:white;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav h1{
font-size:24px;
}

nav ul{
list-style:none;
display:flex;
}

nav ul li{
margin-left:20px;
cursor:pointer;
}

/* Hero */
.hero{
height:300px;
background:linear-gradient(135deg,#0a66ff,#5aa0ff);
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h2{
font-size:40px;
margin-bottom:10px;
}

/* Products */
.products{
padding:50px;
display:grid;
grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
gap:30px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
}

.card h3{
margin:10px 0;
}

.price{
color:#0a66ff;
font-size:18px;
font-weight:bold;
margin-bottom:10px;
}

button{
background:#0a66ff;
color:white;
border:none;
padding:10px 18px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#084ec7;
}

/* Footer */
footer{
background:#0a66ff;
color:white;
text-align:center;
padding:15px;
margin-top:40px;
}

</style>
</head>

<body>

<nav>
<h1>Thejas Store</h1>
<ul>
<li>Home</li>
<li>Products</li>
<li>Contact</li>
</ul>
</nav>

<div class="hero">
<h2>Welcome to Thejas Store</h2>
<p>Best Products at Best Price</p>
</div>

<section class="products">

<div class="card">
<img src="https://via.placeholder.com/300" alt="">
<h3>Product 1</h3>
<p class="price">₹499</p>
<button>Buy Now</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300" alt="">
<h3>Product 2</h3>
<p class="price">₹799</p>
<button>Buy Now</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300" alt="">
<h3>Product 3</h3>
<p class="price">₹999</p>
<button>Buy Now</button>
</div>

</section>

<footer>
<p>© 2026 Thejas Store</p>
</footer>

</body>
</html>
