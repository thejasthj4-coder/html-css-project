<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thejas Mart</title>

<style>

/* Reset */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, sans-serif;
}

body{
background:#e3e6e6;
}

/* Top Navbar */
.navbar{
background:#131921;
color:white;
display:flex;
align-items:center;
padding:10px 20px;
}

.logo{
font-size:22px;
font-weight:bold;
margin-right:20px;
}

.search{
flex:1;
display:flex;
}

.search input{
width:100%;
padding:10px;
border:none;
outline:none;
}

.search button{
background:#febd69;
border:none;
padding:10px 18px;
cursor:pointer;
}

.nav-links{
margin-left:20px;
}

/* Second Menu */
.menu{
background:#232f3e;
color:white;
padding:10px;
display:flex;
gap:20px;
font-size:14px;
}

/* Hero Banner */
.hero{
height:300px;
background:linear-gradient(#4fa3ff,#ffffff);
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
font-weight:bold;
}

/* Products */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:30px;
}

.card{
background:white;
padding:15px;
border-radius:8px;
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card h3{
margin:10px 0;
}

.price{
color:#b12704;
font-weight:bold;
}

button{
background:#ffd814;
border:none;
padding:8px 15px;
margin-top:10px;
cursor:pointer;
}

button:hover{
background:#f7ca00;
}

/* Footer */
footer{
background:#131921;
color:white;
text-align:center;
padding:20px;
margin-top:20px;
}

</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
<div class="logo">ThejasMart</div>

<div class="search">
<input type="text" placeholder="Search products">
<button>Search</button>
</div>

<div class="nav-links">Account</div>
<div class="nav-links">Orders</div>
<div class="nav-links">Cart</div>
</div>

<!-- Menu -->
<div class="menu">
<div>All</div>
<div>Electronics</div>
<div>Fashion</div>
<div>Mobiles</div>
<div>Home</div>
<div>Books</div>
</div>

<!-- Hero -->
<div class="hero">
Welcome to Thejas Mart
</div>

<!-- Products -->
<section class="products">

<div class="card">
<img src="https://via.placeholder.com/300">
<h3>Wireless Headphones</h3>
<p class="price">₹1,499</p>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300">
<h3>Smart Watch</h3>
<p class="price">₹2,999</p>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300">
<h3>Running Shoes</h3>
<p class="price">₹1,999</p>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300">
<h3>Backpack</h3>
<p class="price">₹899</p>
<button>Add to Cart</button>
</div>

</section>

<footer>
© 2026 Thejas Mart | Amazon Style Layout
</footer>

</body>
</html>
